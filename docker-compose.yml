services:
  voicevox:
    image: voicevox/voicevox_engine:latest
    ports:
      - "50021:50021"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:50021/speakers"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      voicevox:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - VOICEVOX_HOST=http://voicevox:50021
    volumes:
      - ./output:/app/output
      - ./data:/app/data
      - ./assets:/app/assets
    env_file:
      - .env
